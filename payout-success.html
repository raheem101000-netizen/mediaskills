<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaSkills — Prize Payout</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#000000;--card:#111111;--text:#f0eeff;--muted:rgba(200,195,255,0.5);--border:rgba(255,255,255,0.07);
  --teal:#00f5d4;--teal2:#00b89a;--green:#22ff6e;--green2:#00a030;
  --purple:#bf5fff;--purple2:#6600bb;--gold:#ffe44d;--gold2:#997700;
}
body{background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.nav{height:60px;background:rgba(0,0,0,0.98);border-bottom:4px solid rgba(255,255,255,0.1);display:flex;align-items:center;padding:0 28px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-hex{width:36px;height:36px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;box-shadow:3px 3px 0 var(--purple2);}
.logo-text{font-size:12px;letter-spacing:2px;color:#fff;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.trophy{font-size:64px;margin-bottom:32px;filter:drop-shadow(0 0 24px var(--gold));}
.title{font-size:18px;color:var(--gold);text-shadow:4px 4px 0 var(--gold2);margin-bottom:20px;line-height:1.8;}
.sub{font-size:10px;color:var(--muted);margin-bottom:40px;line-height:2;}
.status-box{background:var(--card);border:2px solid var(--border);padding:24px 32px;margin-bottom:32px;min-width:300px;}
.status-line{font-size:10px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;gap:24px;}
.status-val{color:var(--text);}
.msg{font-size:11px;line-height:2;padding:16px;background:rgba(34,255,110,0.08);border:2px solid var(--green2);color:var(--green);}
.msg.error{background:rgba(255,71,87,0.08);border-color:#aa0011;color:#ff4757;}
.btn-home{display:inline-block;margin-top:32px;padding:14px 28px;background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff;font-family:'Press Start 2P',monospace;font-size:10px;text-decoration:none;box-shadow:4px 4px 0 var(--purple2);}
.btn-home:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--purple2);}
.loader{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/">
    <div class="logo-hex">M</div>
    <span class="logo-text">MEDIASKILLS</span>
  </a>
</nav>
<main class="main">
  <div class="trophy">&#127942;</div>
  <div class="title">YOUR $8 PRIZE<br>IS ON ITS WAY</div>
  <div class="sub">Thanks for competing on MediaSkills.<br>Your prize transfer is being processed.</div>
  <div class="status-box">
    <div class="status-line"><span>AMOUNT</span><span class="status-val" id="amount-val">—</span></div>
    <div class="status-line"><span>ACCOUNT</span><span class="status-val" id="account-val" style="font-size:8px;">—</span></div>
    <div class="status-line"><span>STATUS</span><span class="status-val" id="status-val"><span class="loader"></span>Processing...</span></div>
  </div>
  <div id="result-msg" class="msg" style="display:none;"></div>
  <a class="btn-home" href="/">&#8592; BACK TO GAMES</a>
</main>
<script>
const p = new URLSearchParams(window.location.search);
const account = p.get('account');
const amount = parseInt(p.get('amount') || '800', 10);
document.getElementById('amount-val').textContent = '$' + (amount / 100).toFixed(2);
document.getElementById('account-val').textContent = account ? account.slice(0, 18) + '...' : '—';
if (account) {
  fetch('https://pong-claus-1.onrender.com/complete-payout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ account_id: account, prize_amount_cents: amount })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      document.getElementById('status-val').textContent = '✓ SENT';
      document.getElementById('status-val').style.color = 'var(--green)';
      const msg = document.getElementById('result-msg');
      msg.style.display = 'block';
      msg.textContent = 'TRANSFER COMPLETE — YOUR $' + (amount / 100).toFixed(2) + ' PRIZE HAS BEEN SENT';
    } else {
      throw new Error(data.error || 'Transfer failed');
    }
  })
  .catch(err => {
    document.getElementById('status-val').textContent = 'ERROR';
    document.getElementById('status-val').style.color = '#ff4757';
    const msg = document.getElementById('result-msg');
    msg.className = 'msg error';
    msg.style.display = 'block';
    msg.textContent = 'ERROR: ' + err.message;
  });
} else {
  document.getElementById('status-val').textContent = 'MISSING PARAMS';
  document.getElementById('status-val').style.color = '#ff4757';
}
</script>
</body>
</html>
