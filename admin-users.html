<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaSkills — Admin Users</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --bg:#000000;
  --card:#0d0d0d;
  --text:#f0eeff;
  --white:#ffffff;
  --muted:rgba(200,195,255,0.5);
  --border:rgba(255,255,255,0.07);
  --teal:#00f5d4;   --teal2:#00b89a;
  --green:#22ff6e;  --green2:#00a030;
  --red:#ff4757;    --red2:#aa0011;
  --grey:#555;      --grey2:#222;
}
html,body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;min-height:100%;overflow-x:hidden;}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

.pxbtn{
  font-family:'Press Start 2P',monospace;
  font-size:7px;padding:10px 16px;letter-spacing:1px;
  border:2px solid var(--teal2);background:var(--teal);color:#020c0a;
  box-shadow:3px 3px 0 var(--teal2);
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  transition:transform .05s;
}
.pxbtn:hover{background:#1ffcde;}
.pxbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--teal2);}

.wrap{max-width:1100px;margin:0 auto;padding:32px 20px 60px;}

.hdr{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.hdr-title{font-size:20px;letter-spacing:3px;color:var(--white);}
.hdr-title span{color:var(--teal);text-shadow:3px 3px 0 var(--teal2);}
.hdr-stats{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.stat-chip{
  background:var(--card);border:2px solid var(--border);
  padding:8px 14px;font-size:6px;color:var(--muted);letter-spacing:1px;
  display:flex;align-items:center;gap:8px;
}
.stat-chip b{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text);}
#countdown{color:var(--teal);}

.totals-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;}
.total-box{
  flex:1;min-width:220px;
  background:var(--card);
  border:3px solid var(--teal);
  box-shadow:5px 5px 0 var(--teal2);
  padding:20px 24px;
}
.total-label{font-size:7px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.total-num{font-family:'Share Tech Mono',monospace;font-size:32px;color:var(--teal);text-shadow:3px 3px 0 var(--teal2);}

.table-box{
  background:var(--card);
  border:3px solid var(--border);
  box-shadow:4px 4px 0 #000;
  overflow-x:auto;
}
table{width:100%;border-collapse:collapse;font-size:8px;letter-spacing:.5px;min-width:760px;}
th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
th{
  background:rgba(255,255,255,0.02);color:var(--muted);
  font-size:6px;letter-spacing:1px;text-transform:uppercase;user-select:none;
}
th.sortable{cursor:pointer;}
th.sortable:hover{color:var(--text);}
th .arrow{color:var(--teal);margin-left:4px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
td.id{color:rgba(200,195,255,.35);font-family:'Share Tech Mono',monospace;}
td.name{color:var(--white);}
td.email{color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:8px;}
td.balance{color:var(--green);font-family:'Share Tech Mono',monospace;font-size:11px;}
td.paypal{color:#ffe44d;font-family:'Share Tech Mono',monospace;font-size:8px;}
td.signup{color:rgba(200,195,255,.35);font-family:'Share Tech Mono',monospace;font-size:7px;}
.empty-note{padding:24px 18px;font-size:7px;color:rgba(200,195,255,.25);letter-spacing:.5px;}

/* ── PASSWORD GATE ── */
#gate{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;align-items:center;justify-content:center;
}
.gate-box{
  background:var(--card);border:3px solid var(--teal);box-shadow:5px 5px 0 var(--teal2);
  padding:28px 32px;max-width:320px;width:90%;text-align:center;
}
.gate-title{font-size:11px;color:var(--white);letter-spacing:1px;margin-bottom:18px;}
.gate-title span{color:var(--teal);}
#gate-input{
  width:100%;font-family:'Share Tech Mono',monospace;font-size:13px;
  background:#000;color:var(--text);border:2px solid var(--border);
  padding:10px 12px;letter-spacing:1px;margin-bottom:14px;outline:none;
}
#gate-input:focus{border-color:var(--teal);}
#gate-error{font-size:6px;color:var(--red);letter-spacing:.5px;margin-bottom:10px;min-height:8px;}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-title">TENTEN<span> ADMIN</span></div>
    <input type="password" id="gate-input" placeholder="ADMIN KEY" autofocus>
    <div id="gate-error"></div>
    <button class="pxbtn" style="width:100%;justify-content:center;" onclick="submitGate()">▶ ENTER</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <div class="wrap">
    <div class="hdr">
      <div class="hdr-title">TENTEN<span> USERS</span></div>
      <div class="hdr-stats">
        <a class="pxbtn" href="/admin">◀ DASHBOARD</a>
        <div class="stat-chip">NEXT REFRESH <b id="countdown">30s</b></div>
        <div class="stat-chip">LAST REFRESHED <b id="last-refreshed">—</b></div>
      </div>
    </div>

    <div class="totals-row">
      <div class="total-box">
        <div class="total-label">Total Users</div>
        <div class="total-num" id="total-count">0</div>
      </div>
      <div class="total-box">
        <div class="total-label">Total Combined Balance</div>
        <div class="total-num" id="total-balance">$0.00</div>
      </div>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Display Name</th>
            <th>Email</th>
            <th class="sortable" id="th-balance" onclick="toggleSort()">Balance<span class="arrow" id="sort-arrow">▼</span></th>
            <th>PayPal Email</th>
            <th>Signed Up</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty-note" id="empty-note" style="display:none;">No users found.</div>
    </div>
  </div>
</div>

<script>
const ADMIN_KEY_STORAGE = 'tenten_admin_key';
let adminKey = sessionStorage.getItem(ADMIN_KEY_STORAGE) || '';
let users = [];
let sortDir = 'desc'; // API already returns balance DESC by default

function submitGate() {
  const val = document.getElementById('gate-input').value.trim();
  if (!val) return;
  adminKey = val;
  loadUsers(true);
}
document.getElementById('gate-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGate();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderUsers() {
  const sorted = users.slice().sort((a, b) => {
    const diff = parseFloat(a.balance) - parseFloat(b.balance);
    return sortDir === 'desc' ? -diff : diff;
  });
  document.getElementById('sort-arrow').textContent = sortDir === 'desc' ? '▼' : '▲';

  document.getElementById('total-count').textContent = users.length;
  const totalBalance = users.reduce((sum, u) => sum + parseFloat(u.balance || 0), 0);
  document.getElementById('total-balance').textContent = '$' + totalBalance.toFixed(2);

  const rows = document.getElementById('rows');
  const emptyNote = document.getElementById('empty-note');
  if (sorted.length === 0) {
    rows.innerHTML = '';
    emptyNote.style.display = 'block';
    return;
  }
  emptyNote.style.display = 'none';
  rows.innerHTML = sorted.map(u => `
    <tr>
      <td class="id">${esc(u.id)}</td>
      <td class="name">${esc(u.display_name)}</td>
      <td class="email">${esc(u.email)}</td>
      <td class="balance">$${parseFloat(u.balance || 0).toFixed(2)}</td>
      <td class="paypal">${esc(u.paypal_email || '—')}</td>
      <td class="signup">${new Date(u.created_at).toLocaleDateString()}</td>
    </tr>
  `).join('');
}

function toggleSort() {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  renderUsers();
}

async function loadUsers(isFirstLoad) {
  try {
    const res = await fetch(`/api/admin-list-users?key=${encodeURIComponent(adminKey)}`, { cache: 'no-store' });
    if (res.status === 401) {
      if (isFirstLoad) {
        document.getElementById('gate-error').textContent = 'Invalid key';
        sessionStorage.removeItem(ADMIN_KEY_STORAGE);
      }
      return;
    }
    if (!res.ok) throw new Error('bad response');
    users = await res.json();
    sessionStorage.setItem(ADMIN_KEY_STORAGE, adminKey);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderUsers();
    document.getElementById('last-refreshed').textContent = new Date().toLocaleTimeString();
  } catch (e) {
    if (isFirstLoad) document.getElementById('gate-error').textContent = 'Error loading users';
  }
}

let countdown = 30;
function tickCountdown() {
  countdown--;
  if (countdown <= 0) {
    countdown = 30;
    loadUsers(false);
  }
  document.getElementById('countdown').textContent = countdown + 's';
}

if (adminKey) loadUsers(true);
setInterval(tickCountdown, 1000);
</script>
</body>
</html>
