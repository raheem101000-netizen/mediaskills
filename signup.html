<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENTEN — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --bg:#000;--card:#111;--text:#f0eeff;--muted:rgba(200,195,255,0.5);
  --border:rgba(255,255,255,0.07);--teal:#00f5d4;--teal2:#00b89a;
  --purple:#bf5fff;--purple2:#6600bb;--gold:#ffe44d;--red:#ff4757;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}

.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(0,0,0,0.98);
  border-bottom:3px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 24px;z-index:100;}
.nav-logo{font-size:12px;letter-spacing:2px;color:#fff;text-decoration:none;}

.box{
  margin-top:56px;width:100%;max-width:440px;
  background:#0d0d0d;border:3px solid var(--purple);
  box-shadow:6px 6px 0 var(--purple2);
}
.box-title{
  background:var(--purple);padding:10px 16px;
  font-size:8px;letter-spacing:1px;color:#fff;
  display:flex;align-items:center;gap:8px;
}
.box-body{padding:28px 24px;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:6px;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.field input{
  width:100%;background:#000;border:2px solid rgba(255,255,255,0.12);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  padding:11px 14px;outline:none;transition:border-color .1s;
}
.field input:focus{border-color:var(--purple);}
.field input::placeholder{color:rgba(200,195,255,0.25);}

.avatar-preview{
  width:72px;height:72px;border-radius:50%;border:3px solid var(--purple);
  background:#1a1a2e;display:flex;align-items:center;justify-content:center;
  overflow:hidden;margin:8px 0 4px;cursor:pointer;position:relative;
  font-size:22px;
}
.avatar-preview img{width:100%;height:100%;object-fit:cover;display:none;}
.avatar-hint{font-family:'Outfit',sans-serif;font-size:11px;color:var(--muted);margin-bottom:4px;}
#avatar-input{display:none;}

.btn-submit{
  width:100%;background:var(--purple);color:#fff;
  border:2px solid var(--purple2);box-shadow:4px 4px 0 var(--purple2);
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:14px;cursor:pointer;letter-spacing:1px;
  transition:transform .05s;margin-top:8px;
}
.btn-submit:hover{background:#cc66ff;}
.btn-submit:active{transform:translate(3px,3px);box-shadow:none;}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.alt-link{
  text-align:center;margin-top:20px;
  font-size:6px;color:var(--muted);letter-spacing:1px;
}
.alt-link a{color:var(--teal);text-decoration:none;border-bottom:1px solid var(--teal2);}

.error-msg{
  background:rgba(255,71,87,0.12);border:2px solid var(--red);
  color:var(--red);font-size:6px;padding:10px 14px;letter-spacing:.5px;
  margin-bottom:16px;display:none;
}
.error-msg.show{display:block;}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/">TENTEN</a>
</nav>

<div class="box">
  <div class="box-title">★ CREATE ACCOUNT</div>
  <div class="box-body">
    <div class="error-msg" id="err"></div>

    <div class="field">
      <label>Display Name</label>
      <input type="text" id="display_name" placeholder="YourName" maxlength="30" autocomplete="nickname">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password">
    </div>

    <div class="field">
      <label>Avatar <span style="color:rgba(200,195,255,0.3)">(optional)</span></label>
      <div class="avatar-preview" id="avatar-preview" onclick="document.getElementById('avatar-input').click()">
        <span id="avatar-emoji">👤</span>
        <img id="avatar-img" alt="avatar">
      </div>
      <div class="avatar-hint">Click to upload a photo</div>
      <input type="file" id="avatar-input" accept="image/*">
    </div>

    <button class="btn-submit" id="submit-btn" onclick="doSignup()">▶ CREATE ACCOUNT</button>
    <div class="alt-link">Already have an account? <a href="/login.html">Log in</a></div>
  </div>
</div>

<script>
let avatarDataUrl = null;

document.getElementById('avatar-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showErr('Image must be under 2MB'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    avatarDataUrl = ev.target.result;
    const img = document.getElementById('avatar-img');
    img.src = avatarDataUrl;
    img.style.display = 'block';
    document.getElementById('avatar-emoji').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.classList.add('show');
}

async function doSignup() {
  const btn = document.getElementById('submit-btn');
  const display_name = document.getElementById('display_name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('err').classList.remove('show');
  if (!display_name || !email || !password) return showErr('All fields except avatar are required');
  if (password.length < 6) return showErr('Password must be at least 6 characters');
  btn.disabled = true;
  btn.textContent = 'CREATING...';
  try {
    const r = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name, email, password, avatar_url: avatarDataUrl })
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || 'Signup failed'); btn.disabled = false; btn.textContent = '▶ CREATE ACCOUNT'; return; }
    window.location.href = '/profile.html';
  } catch (e) {
    showErr('Network error — please try again');
    btn.disabled = false;
    btn.textContent = '▶ CREATE ACCOUNT';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
