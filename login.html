<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENTEN — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --bg:#000;--text:#f0eeff;--muted:rgba(200,195,255,0.5);
  --teal:#00f5d4;--teal2:#00b89a;--purple:#bf5fff;--purple2:#6600bb;--red:#ff4757;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--text);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}

.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(0,0,0,0.98);
  border-bottom:3px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 24px;z-index:100;}
.nav-logo{font-size:12px;letter-spacing:2px;color:#fff;text-decoration:none;}

.box{
  margin-top:56px;width:100%;max-width:400px;
  background:#0d0d0d;border:3px solid var(--teal);
  box-shadow:6px 6px 0 var(--teal2);
}
.box-title{
  background:var(--teal);padding:10px 16px;
  font-size:8px;letter-spacing:1px;color:#020c0a;
  display:flex;align-items:center;gap:8px;
}
.box-body{padding:28px 24px;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:6px;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.field input{
  width:100%;background:#000;border:2px solid rgba(255,255,255,0.12);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  padding:11px 14px;outline:none;transition:border-color .1s;
}
.field input:focus{border-color:var(--teal);}
.field input::placeholder{color:rgba(200,195,255,0.25);}

.btn-submit{
  width:100%;background:var(--teal);color:#020c0a;
  border:2px solid var(--teal2);box-shadow:4px 4px 0 var(--teal2);
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:14px;cursor:pointer;letter-spacing:1px;
  transition:transform .05s;margin-top:8px;
}
.btn-submit:hover{background:#1ffcde;}
.btn-submit:active{transform:translate(3px,3px);box-shadow:none;}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.alt-link{text-align:center;margin-top:20px;font-size:6px;color:var(--muted);letter-spacing:1px;}
.alt-link a{color:var(--teal);text-decoration:none;border-bottom:1px solid var(--teal2);}

.error-msg{
  background:rgba(255,71,87,0.12);border:2px solid var(--red);
  color:var(--red);font-size:6px;padding:10px 14px;letter-spacing:.5px;
  margin-bottom:16px;display:none;
}
.error-msg.show{display:block;}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/">TENTEN</a>
</nav>

<div class="box">
  <div class="box-title">▶ LOG IN</div>
  <div class="box-body">
    <div class="error-msg" id="err"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
    </div>

    <button class="btn-submit" id="submit-btn" onclick="doLogin()">▶ LOG IN</button>
    <div class="alt-link">No account? <a href="/signup.html">Sign up</a></div>
  </div>
</div>

<script>
function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('err').classList.remove('show');
  if (!email || !password) return showErr('Email and password required');
  btn.disabled = true;
  btn.textContent = 'LOGGING IN...';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || 'Login failed'); btn.disabled = false; btn.textContent = '▶ LOG IN'; return; }
    window.location.href = '/profile.html';
  } catch (e) {
    showErr('Network error — please try again');
    btn.disabled = false;
    btn.textContent = '▶ LOG IN';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
